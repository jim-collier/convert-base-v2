# Cut a release on every merge to main. The version var in source/main.go is
# the source of truth. A guard runs first: if the version was not bumped (its
# tag already exists), if it sorts behind the newest tag, or if the README
# Lifecycle badge does not match the version stage, the workflow FAILS - main
# is release-only, so an un-bumped merge is a mistake, not a no-op. On success
# it tags, builds every platform + package, and publishes them.
name: release

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency: release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: guard (version bump + badge)
        id: ver
        run: bash cicd/utility/check-release.bash

      - uses: actions/setup-go@v6
        with:
          go-version-file: .go-version
          cache-dependency-path: source/go.sum

      - name: install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y nsis
          go install "github.com/goreleaser/nfpm/v2/cmd/nfpm@$(sed -n 's/^NFPM_VERSION=//p' cicd/tool-versions.env)"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: release notes
        run: |
          awk -v ver="${{ steps.ver.outputs.ver }}" '
            index($0, "## " ver) == 1 { on = 1; next }
            /^## / { on = 0 }
            on { print }
          ' changelog.md > "$RUNNER_TEMP/notes.md"
          [ -s "$RUNNER_TEMP/notes.md" ] || echo "See changelog.md." > "$RUNNER_TEMP/notes.md"

      - name: tag
        run: |
          git tag "${{ steps.ver.outputs.ver }}"
          git push origin "refs/tags/${{ steps.ver.outputs.ver }}"

      - name: package
        run: bash cicd/utility/package.bash --version "${{ steps.ver.outputs.ver }}" --out source/dist

      - name: publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ver="${{ steps.ver.outputs.ver }}"
          pre=""; case "$ver" in *-*) pre="--prerelease" ;; esac
          gh release create "$ver" --title "$ver" --notes-file "$RUNNER_TEMP/notes.md" $pre \
            source/dist/*
