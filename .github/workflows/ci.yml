# Bare-bones safety net: prove the module vets, tests, and builds off the dev
# box. The full pipeline (fuzz, profiling, dogfood, publish) stays local.
name: ci

on:
  push:
    branches: [main, dev]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: source
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: .go-version
          cache-dependency-path: source/go.sum
      - name: vet
        run: go vet ./...
      - name: test
        run: go test ./...
      - name: build
        run: go build ./...
