# Release packaging. Mirrors the Makefile's release target exactly: same six
# platforms, same archive names (amd64 labeled x86_64), tgz everywhere but
# windows (zip), bare binary at the archive root. Adds checksums.txt.
# Local day-to-day builds still go through the Makefile; this runs from the
# release workflow on a merge to main.
version: 2

project_name: convert-base-v2

builds:
  - dir: source
    binary: convert-base-v2
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    # {{.Tag}} keeps the leading v, matching the Makefile's git-describe stamp.
    ldflags:
      - -s -w -X main.version={{.Tag}}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

archives:
  - name_template: '{{ .ProjectName }}-{{ .Os }}-{{ if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}'
    formats: [tgz]
    format_overrides:
      - goos: windows
        formats: [zip]
    # A glob that matches nothing: ship only the binary, like make release does.
    files:
      - none*

checksum:
  name_template: checksums.txt

# Release notes come from changelog.md via the workflow's --release-notes
# file, which replaces goreleaser's generated changelog. Don't set
# changelog.disable here: that also makes goreleaser ignore the notes file
# (found the hard way - it published an empty release body).

release:
  prerelease: auto
