# Example ~/.config/convert-base-v2/convert-base-v2.conf (YAML format).
# Top-level is a YAML list; each entry defines one base.
#
# Fields:
#   aliases: [names...]   # first entry is the canonical name; later matches override built-ins
#   symbols: "..."        # string form - whitespace-delimited, optional "neg=X dec=Y" trailer
#     OR
#   symbols: [...]        # list form - each entry is one literal digit (use for symbols
#                         # containing whitespace or "=" that would confuse the spec parser)
#   negative: "X"         # optional; overrides any neg= in symbols string
#   decimal:  "Y"         # optional; overrides any dec= in symbols string
#
# Defaults for negative/decimal are "-" and ".". If the default marker is also a
# digit in the base, that feature (sign or fraction) is silently disabled.
# An explicit negative/decimal that conflicts with a digit is an error.

# Lowercase hex. Overrides the built-in "hex" aliases; the "16" alias is
# unaffected because we don't include it here.
- aliases: [hex, hexadecimal]
  symbols: "0123456789abcdef"

# A toy base 4.
- aliases: [abcd, 4abc]
  symbols: "ABCD"

# Base where the default "-" is itself a digit; give it a different negative.
- aliases: [u12]
  symbols: "0123456789-_"
  negative: "N"

# In-string trailer form.
- aliases: [b8alt]
  symbols: "0 1 2 3 4 5 6 7 neg=~ dec=,"

# List form. Preserves symbols that would otherwise be hard to write in a
# whitespace-delimited string.
- aliases: [emoji4]
  symbols: ["🍎", "🍊", "🍋", "🍌"]
