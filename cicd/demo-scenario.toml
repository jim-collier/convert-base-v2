# Demo scenario for gen-demo-gif.py. Each [[step]] types its show= line into the
# fake terminal, runs run= (default: show) for real, and shows the output. {prog}
# renders as the program name; {bin} runs as the tested binary path. pause= is the
# read time in seconds. overflow= is "truncate" (default) or "wrap". scrollrate=
# (px/s) and linems= pace a step's output; wpm_digits speeds up number typing.

title = "convert-base-v2"
prog  = "convert-base-v2"
seed  = 11
font  = ["Monaspace Argon SemiBold"]
wpm_digits = 255

[[step]]
note  = "Positional notation conversion - any size, any base"
show  = "{prog} --from 10 --to 32wordsafe 31415926535897932384626433832795028841971"
pause = 2.4

[[step]]
show  = "{prog} --from 10 --to emoji64 271828182845904523536028747135266249"
pause = 2.6

[[step]]
note  = "Bring your own alphabet"
show  = "{prog} --from-symbols 'A B C D' --to 10 CBBA.B"
pause = 2.4

[[step]]
note  = "Dozens of named bases built in"
show  = "{prog} --list"
pause = 3.0
scrollrate = 78
linems = 255

[[step]]
note  = "Binary/text encoding and decoding - faster than basenc"
show  = "head -c 120 /bin/true | {prog} --binary --to 64u"
overflow = "wrap"
pause = 2.6

[[step]]
show  = "head -c 120 /bin/true | {prog} --binary --to 2048twitter"
overflow = "wrap"
pause = 2.6

[[step]]
show  = "echo -n SGVsbG8sIHdvcmxkIQ | {prog} --from 64u --to bytes"
pause = 3.2
